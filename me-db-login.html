<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MeDB &middot; Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 14px; padding: 48px 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 380px; width: 100%; }
  .card h1 { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
  .card p { font-size: 0.9rem; color: #888; margin-bottom: 32px; }
  .google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; background: #1a1a2e; color: white; border: none; border-radius: 8px; padding: 14px 24px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; }
  .google-btn:hover { background: #2d2d4e; }
  .google-btn svg { flex-shrink: 0; }
  .error { margin-top: 20px; background: #fff3e0; color: #e65100; border-radius: 8px; padding: 12px; font-size: 0.85rem; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Health Dashboard</h1>
  <p>Bitte melde dich mit deinem Google-Account an</p>
  <button class="google-btn" onclick="loginWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.8 18.9 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.3 0-9.6-3.1-11.3-7.5L6 33.8C9.4 39.8 16.2 44 24 44z"/>
      <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.6l6.2 5.2C41 35.4 44 30.2 44 24c0-1.3-.1-2.6-.4-3.9z"/>
    </svg>
    Mit Google anmelden
  </button>
  <div class="error" id="error"></div>
</div>

<script>
const SUPABASE_URL = 'https://thgawuqcogugzurrijkp.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoZ2F3dXFjb2d1Z3p1cnJpamtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTI1MTIsImV4cCI6MjA5NjM4ODUxMn0.IK7vJwPdmZ7OFCMq1QfI5wTM4B6IBw-04AJoJun-s8w';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, ANON_KEY);

// OAuth Callback abfangen (Token in URL nach Google-Redirect)
db.auth.onAuthStateChange(async (event, session) => {
  if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session) {
    checkAndRedirect(session.user.email);
  }
});

async function loginWithGoogle() {
  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://stschaab.github.io/me-db/me-db-login.html' }
  });
  if (error) showError(error.message);
}

async function checkAndRedirect(email) {
  const { data } = await db.from('allowed_users').select('email').eq('email', email).single();
  if (data) {
    window.location.href = 'me-db-dashboard.html';
  } else {
    await db.auth.signOut();
    showError(`Zugang verweigert. ${email} ist nicht berechtigt.`);
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
